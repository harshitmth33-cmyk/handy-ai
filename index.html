<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Handy AI</title><!-- Google Fonts --><link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono&display=swap" rel="stylesheet"><!-- MediaPipe --><script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script><script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script><style>
:root{
  --accent:#7cffc4;
  --accent2:#ff6bca;
  --accent3:#6bb5ff;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#03020a;
  color:white;
  font-family:'DM Mono', monospace;
  overflow:hidden;
}

/* Splash */
#splash{
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#03020a;
  z-index:999;
}
.logo{
  font-family:'Syne';
  font-size:4rem;
  background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.subtitle{opacity:0.7;margin:10px 0;}
.btn{
  margin-top:30px;
  padding:12px 30px;
  border-radius:30px;
  background:var(--accent);
  color:#000;
  cursor:pointer;
  box-shadow:0 0 20px var(--accent);
}

/* Layout */
video,canvas{
  position:fixed;
  inset:0;
  width:100%; height:100%;
}
video{
  transform:scaleX(-1);
  filter:brightness(0.4);
}
canvas{pointer-events:none}

/* Top bar */
.topbar{
  position:fixed; top:0; left:0; right:0;
  height:50px;
  display:flex; justify-content:space-between;
  align-items:center;
  padding:0 20px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.05);
}
.brand{
  font-family:'Syne';
  background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.modes button{
  margin:0 5px;
  padding:6px 12px;
  border-radius:20px;
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}
.active{box-shadow:0 0 10px var(--accent);}

/* HUD */
#hud{
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
}

/* Toast */
#toast{
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  font-size:2rem;
  opacity:0;
  transition:0.3s;
}
.show{opacity:1; transform:translate(-50%,-50%) scale(1);}
</style></head><body><!-- Splash --><div id="splash">
  <div class="logo">Handy AI</div>
  <div class="subtitle">GESTURE INTELLIGENCE PLATFORM</div>
  <div class="btn" onclick="start()">Enter Experience</div>
</div><!-- Video --><video id="video" autoplay playsinline></video>

<canvas id="fx"></canvas>

<!-- Top bar --><div class="topbar">
  <div class="brand">Handy AI</div>
  <div class="modes">
    <button onclick="setMode('play')" id="playBtn">▶</button>
    <button onclick="setMode('shapes')" id="shapeBtn">♥</button>
    <button onclick="setMode('write')" id="writeBtn">✏</button>
  </div>
  <div id="fps">0 FPS</div>
</div><!-- HUD --><div id="hud">No gesture</div><div id="toast"></div><script>
let mode="play";
let video=document.getElementById("video");
let canvas=document.getElementById("fx");
let ctx=canvas.getContext("2d");

let hands;
let lastTime=0, fps=0;

/* Resize */
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
window.onresize=resize; resize();

/* Toast */
function showToast(txt){
  let t=document.getElementById("toast");
  t.innerText=txt;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

/* Mode switch */
function setMode(m){
  mode=m;
  document.querySelectorAll(".modes button").forEach(b=>b.classList.remove("active"));
  if(m==="play") playBtn.classList.add("active");
  if(m==="shapes") shapeBtn.classList.add("active");
  if(m==="write") writeBtn.classList.add("active");
}

/* Start */
async function start(){
  splash.style.display="none";

  let stream=await navigator.mediaDevices.getUserMedia({
    video:{width:1920,height:1080}
  });
  video.srcObject=stream;

  hands=new Hands({
    locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.72,
    minTrackingConfidence:0.72
  });

  hands.onResults(onResults);

  const camera=new Camera(video,{
    onFrame:async()=>await hands.send({image:video}),
    width:1920,height:1080
  });
  camera.start();
}

/* Drawing helpers */
function drawCircle(x,y,r,color){
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=color;
  ctx.fill();
}

/* Results */
function onResults(res){
  let now=performance.now();
  fps=1000/(now-lastTime);
  lastTime=now;
  document.getElementById("fps").innerText=fps.toFixed(0)+" FPS";

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!res.multiHandLandmarks) return;

  res.multiHandLandmarks.forEach(hand=>{
    hand.forEach(lm=>{
      let x=lm.x*canvas.width;
      let y=lm.y*canvas.height;

      if(mode==="play"){
        drawCircle(x,y,5,"hsl("+Date.now()%360+",100%,70%)");
      }

      if(mode==="write"){
        drawCircle(x,y,4,"#6bb5ff");
      }
    });

    /* pinch detect */
    let t=hand[4];
    let i=hand[8];
    let dx=t.x-i.x;
    let dy=t.y-i.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(mode==="play" && dist<0.05){
      showToast("⚡ Pinch");
    }
  });

  document.getElementById("hud").innerText=mode.toUpperCase();
}
</script></body>
</html>
